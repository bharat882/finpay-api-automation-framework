name: FinPay API Automation Suite

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Newman
        run: npm install -g newman

      - name: Install HTML Reporter
        run: npm install -g newman-reporter-html

      - name: Create Reports Directory
        run: mkdir -p reports

      - name: Run API Tests with HTML Report
        run: |
          newman run collections/finpay-api-suite.postman_collection.json \
          -e environments/finpay-dev.json \
          -r cli,html \
          --reporter-html-export reports/finpay-report.html

      - name: Verify Report File Exists
        run: ls -R reports

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: finpay-api-test-report
          path: reports/